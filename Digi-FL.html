<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UB-Planungshilfe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f5f7; --surface: rgba(255,255,255,0.82); --surface-solid: #ffffff;
  --glass: rgba(255,255,255,0.72); --glass-border: rgba(255,255,255,0.55);
  --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.13);
  --text: #1d1d1f; --text2: #6e6e73; --text3: #aeaeb2;
  --blue: #0071e3; --blue-light: #147ce5; --blue-bg: rgba(0,113,227,0.09); --blue-glow: rgba(0,113,227,0.22);
  --green: #34c759; --green-bg: rgba(52,199,89,0.1); --green-text: #1a7a3c;
  --red: #ff3b30; --red-bg: rgba(255,59,48,0.09);
  --amber: #ff9f0a; --amber-bg: rgba(255,159,10,0.1);
  --purple: #af52de; --purple-bg: rgba(175,82,222,0.1);
  --radius: 18px; --radius-sm: 12px; --radius-xs: 8px;
  --shadow-sm: 0 2px 12px rgba(0,0,0,0.06); --shadow: 0 8px 32px rgba(0,0,0,0.1);
  --font: "Inter", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
}
html, body { height: 100%; overflow: hidden; }
body { font-family: var(--font); background: var(--bg); color: var(--text); display: flex; height: 100vh; letter-spacing: -0.01em; }
body::before {
  content: ""; position: fixed; inset: 0; z-index: -1;
  background: radial-gradient(ellipse 80% 60% at 15% 10%, rgba(0,113,227,0.07) 0%, transparent 55%),
              radial-gradient(ellipse 60% 55% at 85% 85%, rgba(175,82,222,0.055) 0%, transparent 55%), #f5f5f7;
}
/* SIDEBAR */
.sidebar { width: 228px; flex-shrink: 0; height: 100vh; background: var(--glass); backdrop-filter: blur(28px) saturate(1.9); -webkit-backdrop-filter: blur(28px) saturate(1.9); border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; box-shadow: 2px 0 20px rgba(0,0,0,0.04); }
.sb-head { padding: 1.1rem 1.1rem 0.85rem; border-bottom: 1px solid var(--border); }
.sb-logo { font-size: .69rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--blue); margin-bottom: .18rem; }
.sb-head h1 { font-size: .9rem; font-weight: 700; color: var(--text); }
.sb-head p { font-size: .68rem; color: var(--text3); margin-top: .06rem; }
.sb-list { flex: 1; overflow-y: auto; padding: .5rem .55rem; }
.sb-list::-webkit-scrollbar { width: 3px; } .sb-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.sess { display: flex; align-items: center; gap: .4rem; padding: .48rem .65rem; border-radius: var(--radius-xs); cursor: pointer; margin-bottom: .1rem; min-width: 0; transition: background .15s, transform .15s; }
.sess:hover { background: rgba(0,0,0,0.038); transform: translateX(2px); }
.sess.active { background: var(--blue-bg); }
.sess-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; background: var(--text3); transition: all .25s; }
.sess.active .sess-dot { background: var(--blue); box-shadow: 0 0 7px var(--blue-glow); }
.sess.done .sess-dot { background: var(--green); }
.sess-info { flex: 1; min-width: 0; }
.sess-name { font-size: .79rem; font-weight: 500; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: text; display: block; }
.sess.active .sess-name { color: var(--blue); font-weight: 600; }
.sess-sub { font-size: .63rem; color: var(--text3); margin-top: .04rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sess-name-input { font-size: .79rem; font-weight: 500; color: var(--text); background: none; border: none; border-bottom: 1.5px solid var(--blue); outline: none; width: 100%; font-family: var(--font); padding: 0; }
.sess-del { font-size: .7rem; color: var(--text3); background: none; border: none; cursor: pointer; padding: 2px 5px; border-radius: 4px; opacity: 0; transition: opacity .15s, background .12s; flex-shrink: 0; }
.sess:hover .sess-del { opacity: 1; }
.sess-del:hover { background: var(--red-bg); color: var(--red); }
.btn-new { margin: .4rem .55rem .7rem; padding: .5rem .75rem; border: 1.5px dashed var(--border2); border-radius: var(--radius-xs); background: none; color: var(--text2); font-size: .78rem; font-family: var(--font); cursor: pointer; width: calc(100% - 1.1rem); text-align: left; transition: all .18s; display: flex; align-items: center; gap: .4rem; }
.btn-new:hover { background: var(--blue-bg); border-color: var(--blue); color: var(--blue); }
/* MAIN */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; height: 100vh; overflow: hidden; }
/* TOPBAR */
.topbar { flex-shrink: 0; background: var(--glass); backdrop-filter: blur(22px) saturate(1.7); -webkit-backdrop-filter: blur(22px) saturate(1.7); border-bottom: 1px solid var(--glass-border); padding: .72rem 1.6rem .65rem; }
.tb-meta { font-size: .64rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--text3); margin-bottom: .22rem; }
.tb-title { font-size: 1.02rem; font-weight: 700; color: var(--text); letter-spacing: -.02em; margin-bottom: .52rem; }
.phase-dots { display: flex; align-items: center; gap: .28rem; }
.pdot { width: 7px; height: 7px; border-radius: 50%; background: var(--border2); cursor: pointer; transition: all .28s cubic-bezier(.34,1.56,.64,1); position: relative; }
.pdot:hover { transform: scale(1.5); }
.pdot.done { background: var(--green); }
.pdot.active { background: var(--blue); width: 24px; border-radius: 4px; box-shadow: 0 0 9px var(--blue-glow); }
.pdot-label { position: absolute; top: 14px; left: 50%; transform: translateX(-50%); font-size: .58rem; color: var(--text2); white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity .15s; background: var(--surface-solid); padding: 2px 6px; border-radius: 4px; box-shadow: var(--shadow-sm); z-index: 99; }
.pdot:hover .pdot-label { opacity: 1; }
.prog-wrap { height: 2px; background: var(--border); border-radius: 2px; margin-top: .48rem; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--blue), #5ac8fa); transition: width .65s cubic-bezier(.4,0,.2,1); box-shadow: 0 0 7px rgba(0,113,227,.4); }
/* CONTENT */
.content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
.content::-webkit-scrollbar { width: 5px; } .content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
.pane { display: none; flex-direction: column; } .pane.active { display: flex; }
/* SETUP */
.setup-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 2.2rem 2rem 3rem; max-width: 700px; width: 100%; margin: 0 auto; }
.s-eyebrow { font-size: .67rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--blue); margin-bottom: .32rem; text-align: center; }
.s-title { font-size: 1.45rem; font-weight: 700; color: var(--text); letter-spacing: -.03em; margin-bottom: .28rem; text-align: center; }
.s-sub { font-size: .87rem; color: var(--text2); text-align: center; margin-bottom: 1.85rem; line-height: 1.55; max-width: 460px; }
.s-group { width: 100%; margin-bottom: 1.4rem; }
.s-label { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); margin-bottom: .5rem; display: block; }
/* TYPE CARDS */
.type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .7rem; width: 100%; }
.type-card { background: var(--glass); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1.5px solid var(--glass-border); border-radius: var(--radius); padding: 1.15rem 1.1rem; cursor: pointer; transition: all .25s cubic-bezier(.34,1.26,.64,1); box-shadow: var(--shadow-sm); }
.type-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); border-color: rgba(0,113,227,.3); }
.type-card.sel { border-color: var(--blue); background: var(--blue-bg); box-shadow: 0 0 0 3px var(--blue-glow), var(--shadow); transform: translateY(-3px); }
.tc-icon { font-size: 1.55rem; margin-bottom: .45rem; }
.tc-title { font-size: .9rem; font-weight: 700; color: var(--text); margin-bottom: .18rem; }
.tc-sub { font-size: .74rem; color: var(--text2); line-height: 1.4; }
/* CHIPS */
.chip-row { display: flex; gap: .4rem; flex-wrap: wrap; }
.chip { padding: .38rem .85rem; border-radius: 20px; border: 1.5px solid var(--border2); background: var(--surface-solid); color: var(--text2); font-size: .8rem; font-family: var(--font); cursor: pointer; font-weight: 500; transition: all .2s cubic-bezier(.34,1.26,.64,1); }
.chip:hover { border-color: var(--blue); color: var(--blue); transform: scale(1.05); }
.chip.sel { background: var(--blue); color: #fff; border-color: var(--blue); box-shadow: 0 2px 10px var(--blue-glow); transform: scale(1.05); }
/* DEV GOAL */
.dg-input { width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--surface-solid); color: var(--text); font-family: var(--font); font-size: .9rem; padding: .7rem 1rem; resize: none; line-height: 1.55; transition: border-color .2s, box-shadow .2s; }
.dg-input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-glow); }
.dg-input::placeholder { color: var(--text3); }
/* FACH CARDS */
.fach-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: .58rem; width: 100%; }
.fach-card { border-radius: var(--radius-sm); padding: .9rem .85rem; cursor: pointer; border: 1.5px solid transparent; transition: all .22s cubic-bezier(.34,1.26,.64,1); background: var(--surface-solid); box-shadow: var(--shadow-sm); }
.fach-card:hover { transform: translateY(-2px) scale(1.02); box-shadow: var(--shadow); }
.fach-card.sel { box-shadow: 0 0 0 3px color-mix(in srgb, var(--fc, var(--blue)) 28%, transparent), var(--shadow); transform: translateY(-2px) scale(1.02); border-color: var(--fc, var(--blue)); }
.fc-emoji { font-size: 1.35rem; margin-bottom: .3rem; line-height: 1; }
.fc-name { font-size: .8rem; font-weight: 700; color: var(--text); line-height: 1.25; }
.fc-sub { font-size: .66rem; color: var(--text2); margin-top: .08rem; }
/* JGST */
.jgst-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: .42rem; width: 100%; }
.jg-chip { padding: .58rem .3rem; border-radius: var(--radius-sm); border: 1.5px solid var(--border2); background: var(--surface-solid); color: var(--text2); font-size: .88rem; font-weight: 700; cursor: pointer; text-align: center; transition: all .22s cubic-bezier(.34,1.26,.64,1); }
.jg-chip:hover { border-color: var(--blue); color: var(--blue); transform: translateY(-2px); }
.jg-chip.sel { background: var(--blue); color: #fff; border-color: var(--blue); box-shadow: 0 2px 14px var(--blue-glow); transform: translateY(-2px); }
/* STATUS */
.status-pill { display: inline-flex; align-items: center; gap: .42rem; padding: .42rem .9rem; border-radius: 20px; font-size: .8rem; font-weight: 500; margin-top: .5rem; }
.status-pill.ok { background: var(--green-bg); color: var(--green-text); border: 1px solid rgba(52,199,89,.22); }
.status-pill.err { background: var(--red-bg); color: var(--red); border: 1px solid rgba(255,59,48,.2); }
.status-pill.loading { background: var(--blue-bg); color: var(--blue); border: 1px solid rgba(0,113,227,.15); }
.s-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.s-dot.pulse { animation: pulse 1.2s ease-in-out infinite; }
/* LOADING */
.load-wrap { display: flex; flex-direction: column; align-items: center; gap: .7rem; padding: 1.4rem; }
.load-bar-outer { width: 100%; max-width: 260px; height: 3px; background: var(--border); border-radius: 3px; overflow: hidden; }
.load-bar-inner { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--blue) 0%, #5ac8fa 50%, var(--blue) 100%); background-size: 200% 100%; animation: shimmer 1.4s ease-in-out infinite; }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
.load-text { font-size: .82rem; color: var(--text2); font-weight: 600; }
.load-sub { font-size: .72rem; color: var(--text3); }
/* UV CARDS */
.uv-list { display: flex; flex-direction: column; gap: .42rem; width: 100%; }
.uv-card { background: var(--surface-solid); border: 1.5px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; transition: all .2s cubic-bezier(.34,1.26,.64,1); overflow: hidden; box-shadow: var(--shadow-sm); }
.uv-card:hover { border-color: rgba(0,113,227,.35); transform: translateX(3px); box-shadow: var(--shadow); }
.uv-card.sel { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-glow); }
.uv-card-header { padding: .78rem 1rem; }
.uv-card-title { font-size: .86rem; font-weight: 600; color: var(--text); line-height: 1.45; white-space: normal; word-break: normal; }
.uv-card-meta { font-size: .7rem; color: var(--text3); margin-top: .2rem; }
.uv-card-comps { border-top: 1px solid var(--border); padding: .65rem 1rem .75rem; background: rgba(0,0,0,.014); display: none; flex-direction: column; gap: .22rem; animation: fadeDown .2s ease; }
.uv-card.sel .uv-card-comps { display: flex; }
/* COMP CHIPS */
.comp-section-lbl { font-size: .64rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--text3); margin: .38rem 0 .18rem; }
.comp-section-lbl:first-child { margin-top: 0; }
.comp-chip { display: flex; align-items: flex-start; gap: .5rem; padding: .44rem .72rem; border-radius: var(--radius-xs); border: 1.5px solid var(--border); background: var(--surface-solid); cursor: pointer; font-size: .8rem; color: var(--text2); line-height: 1.5; transition: all .18s; user-select: none; font-family: var(--font); }
.comp-chip:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-bg); }
.comp-chip.sel { background: var(--blue); color: #fff; border-color: var(--blue); }
.comp-check { flex-shrink: 0; width: 1rem; font-size: .78rem; margin-top: .05rem; }
/* CUSTOM COMP */
.custom-comp-input { width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--surface-solid); color: var(--text); font-family: var(--font); font-size: .85rem; padding: .55rem .8rem; resize: none; line-height: 1.5; transition: border-color .2s, box-shadow .2s; }
.custom-comp-input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-glow); }
.custom-comp-input::placeholder { color: var(--text3); }
/* UPLOAD */
.upload-zone { border: 2px dashed var(--border2); border-radius: var(--radius); padding: 1.8rem; text-align: center; cursor: pointer; transition: all .25s; background: rgba(255,255,255,.45); }
.upload-zone:hover, .upload-zone.drag { border-color: var(--blue); background: var(--blue-bg); transform: scale(1.01); }
.upload-zone.has-file { border-color: var(--green); border-style: solid; background: var(--green-bg); }
.upload-icon { font-size: 1.9rem; margin-bottom: .45rem; }
.upload-title { font-size: .88rem; font-weight: 600; color: var(--text); margin-bottom: .18rem; }
.upload-sub { font-size: .74rem; color: var(--text3); }
/* LG */
.lg-section { width: 100%; margin-bottom: .75rem; }
.lg-section-label { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--text3); margin-bottom: .3rem; }
/* BUTTONS */
.btn-primary { padding: .62rem 1.5rem; border-radius: 22px; border: none; background: var(--blue); color: #fff; font-size: .88rem; font-weight: 600; font-family: var(--font); cursor: pointer; transition: all .2s cubic-bezier(.34,1.26,.64,1); box-shadow: 0 4px 16px var(--blue-glow); }
.btn-primary:hover { background: var(--blue-light); transform: scale(1.04); box-shadow: 0 6px 22px var(--blue-glow); }
.btn-primary:disabled { background: var(--border2); color: var(--text3); box-shadow: none; transform: none; cursor: default; }
.btn-ghost { padding: .55rem 1.1rem; border-radius: 22px; border: 1.5px solid var(--border2); background: var(--surface-solid); color: var(--text2); font-size: .84rem; font-weight: 500; font-family: var(--font); cursor: pointer; transition: all .2s; }
.btn-ghost:hover { border-color: var(--text2); color: var(--text); background: rgba(0,0,0,.03); }
.sa { display: flex; gap: .6rem; align-items: center; margin-top: 1.35rem; flex-wrap: wrap; }
/* ═══ QA CHAT ═══ */
.qa-outer { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* Nav bar */
.qa-nav { display: flex; align-items: center; gap: .5rem; padding: .55rem 1.6rem .4rem; flex-shrink: 0; max-width: 720px; width: 100%; margin: 0 auto; }
.qa-nav-btn { width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid var(--border2); background: var(--surface-solid); color: var(--text2); font-size: .85rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .18s; flex-shrink: 0; }
.qa-nav-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-bg); }
.qa-nav-btn:disabled { opacity: .28; cursor: default; }
.qa-phase-label { font-size: .78rem; font-weight: 600; color: var(--text2); flex: 1; text-align: center; }

/* Hero question */
.qa-hero { flex-shrink: 0; padding: .6rem 1.6rem 0; max-width: 720px; width: 100%; margin: 0 auto; }
.q-card {
  background: var(--glass);
  backdrop-filter: blur(20px) saturate(1.6);
  -webkit-backdrop-filter: blur(20px) saturate(1.6);
  border: 1.5px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 1.5rem 1.6rem 1.25rem;
  box-shadow: 0 8px 32px rgba(0,0,0,.1), 0 0 0 1px rgba(255,255,255,.5) inset;
  animation: qIn .3s cubic-bezier(.34,1.26,.64,1);
}
@keyframes qIn {
  from { opacity: 0; transform: scale(.96) translateY(6px); }
  to   { opacity: 1; transform: none; }
}
.q-label { font-size: .63rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--blue); margin-bottom: .5rem; opacity: .8; }
.q-text { font-size: 1.12rem; font-weight: 700; color: var(--text); line-height: 1.45; margin-bottom: .3rem; letter-spacing: -.02em; }
.q-hint { font-size: .82rem; color: var(--text2); font-style: italic; line-height: 1.5; margin-bottom: .4rem; }
.q-tip-btn { font-size: .74rem; color: var(--blue); border: none; background: none; cursor: pointer; padding: 0; font-family: var(--font); font-weight: 500; display: inline-flex; align-items: center; gap: .22rem; margin-top: .5rem; transition: opacity .15s; }
.q-tip-btn:hover { opacity: .65; }
.tip-out { margin-top: .55rem; background: var(--blue-bg); border: 1px solid rgba(0,113,227,.15); border-radius: var(--radius-sm); padding: .65rem .9rem; font-size: .81rem; color: var(--blue); line-height: 1.6; animation: fadeUp .2s ease; }

/* Typing */
.t-bubble { display: inline-flex; gap: 4px; align-items: center; padding: .52rem .9rem; background: var(--surface-solid); border: 1px solid var(--border); border-radius: 20px; box-shadow: var(--shadow-sm); }
.td { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); animation: blink 1.2s infinite; }
.td:nth-child(2) { animation-delay: .15s; } .td:nth-child(3) { animation-delay: .3s; }
@keyframes blink { 0%,80%,100%{opacity:.2;transform:scale(.8);}40%{opacity:1;transform:scale(1.15);} }

/* History accordion */
.qa-history { flex: 1; overflow-y: auto; padding: .8rem 1.6rem 0; max-width: 720px; width: 100%; margin: 0 auto; }
.qa-history::-webkit-scrollbar { width: 4px; }
.qa-history::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.history-toggle {
  display: flex; align-items: center; gap: .5rem;
  font-size: .72rem; font-weight: 600; color: var(--text3);
  cursor: pointer; padding: .35rem 0; margin-bottom: .35rem;
  user-select: none; transition: color .15s;
  text-transform: uppercase; letter-spacing: .07em;
}
.history-toggle:hover { color: var(--text2); }
.history-toggle-icon { font-size: .65rem; transition: transform .2s; }
.history-toggle-icon.open { transform: rotate(90deg); }
.history-toggle-line { flex: 1; height: 1px; background: var(--border); }

.history-items { display: none; flex-direction: column; gap: .5rem; margin-bottom: .65rem; }
.history-items.open { display: flex; animation: fadeUp .2s ease; }

/* Phase summary cards in history */
.phase-sum {
  background: var(--green-bg); border: 1px solid rgba(52,199,89,.2);
  border-radius: var(--radius-sm); padding: .75rem .95rem;
  cursor: pointer; transition: all .18s;
}
.phase-sum:hover { box-shadow: var(--shadow-sm); }
.ps-head { display: flex; align-items: center; gap: .5rem; margin-bottom: .35rem; }
.ps-badge { background: var(--green); color: #fff; font-size: .64rem; font-weight: 700; padding: .16rem .52rem; border-radius: 20px; }
.ps-title { font-size: .84rem; font-weight: 600; color: var(--green-text); flex: 1; }
.ps-chevron { font-size: .7rem; color: var(--green-text); opacity: .6; transition: transform .2s; }
.ps-items { display: flex; flex-direction: column; gap: .22rem; }
.ps-item { font-size: .79rem; color: var(--text); padding-left: .9rem; position: relative; line-height: 1.4; }
.ps-item::before { content: "✓"; position: absolute; left: 0; color: var(--green); font-size: .72rem; }

/* Exchange rows in history */
.exchange {
  background: var(--surface-solid); border: 1px solid var(--border);

}
function hideAuthScreen(){document.getElementById("auth-overlay").classList.add("hidden");}

function renderAuthForm(mode){
  const isSignup=mode==="signup";
  document.getElementById("auth-eyebrow").textContent=isSignup?"Registrieren":"Anmelden";
  document.getElementById("auth-body").innerHTML=`

function authErr(msg){
  const el=document.getElementById("auth-err");if(!el)return;
  el.textContent=msg; el.style.display="block";
}

async function doSignUp(){
  if(!sb)return authErr("Kein Supabase-Client verfügbar.");
  const email=document.getElementById("auth-email").value.trim();
  const pass=document.getElementById("auth-pass").value;
  const school=document.getElementById("auth-school")?.value.trim()||"";
  if(!email||pass.length<6)return authErr("Bitte gültige E-Mail und Passwort (mind. 6 Zeichen) eingeben.");
  const {data,error}=await sb.auth.signUp({email,password:pass});
  if(error)return authErr(error.message);
  if(data.user&&school){
    await sb.from("profiles").upsert({id:data.user.id,school});
  }
  if(!data.session){
    authErr("Fast fertig — bitte bestätige den Link in der E-Mail, die wir dir geschickt haben, und melde dich danach an.");
    return;
  }
  hideAuthScreen();
}

async function doSignIn(){
  if(!sb)return authErr("Kein Supabase-Client verfügbar.");
  const email=document.getElementById("auth-email").value.trim();
  const pass=document.getElementById("auth-pass").value;
  if(!email||!pass)return authErr("Bitte E-Mail und Passwort eingeben.");
  const {error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error)return authErr(error.message);
  hideAuthScreen();
}

async function signOut(){
  if(!sb)return;
  await sb.auth.signOut();
}

// Beim Einloggen: falls in der Cloud schon Daten liegen, gelten die als
// Quelle der Wahrheit (Sync von einem anderen Gerät). Sonst wird der
// aktuelle lokale Stand einmalig hochgeladen, damit nichts verloren geht.
async function pullOrSeedCloudState(){
  if(!sb||!currentUser)return;
  const {data,error}=await sb.from("app_state").select("sessions,reihen").eq("user_id",currentUser.id).maybeSingle();
  if(error)return;
  if(data&&((data.sessions&&data.sessions.length)||(data.reihen&&data.reihen.length))){
    if(data.sessions&&data.sessions.length){sessions=data.sessions;activeId=sessions[0].id;}
    if(data.reihen)reihen=data.reihen;
    saveSessions(); saveReihen();
    currentMode="session"; switchSession(activeId);
  }else{
    pushCloudStateNow();
  }
}

function pushCloudState(){
  if(!sb||!currentUser)return;
  clearTimeout(cloudSyncTimer);
  cloudSyncTimer=setTimeout(pushCloudStateNow,1200);
}
async function pushCloudStateNow(){
  if(!sb||!currentUser)return;
  try{
    await sb.from("app_state").upsert({user_id:currentUser.id,sessions,reihen,updated_at:new Date().toISOString()});
  }catch(e){}
}

function initAuth(){
  if(!sb)return;
  sb.auth.getSession().then(({data})=>{
    currentUser=data.session?data.session.user:null;
    renderAuthStatus();
    if(currentUser)pullOrSeedCloudState();
  });
  sb.auth.onAuthStateChange((event,session)=>{
    currentUser=session?session.user:null;
    renderAuthStatus();
    if(event==="SIGNED_IN")pullOrSeedCloudState();
  });
}

        `<p style="font-size:.82rem;color:var(--text2);line-height:1.55;">Alles klar — dann läuft die Planung ohne besonderen Entwicklungsschwerpunkt, einfach als reine Planungshilfe.</p>`
        :
        `<textarea class="step-textarea" id="dg-ta" rows="3" placeholder="z.B. Gesprächs- und Reflexionsphasen qualitativ verbessern — offene Fragen, SuS-aktivierend, ausreichend Denkzeit…">${esc(s.dg||"")}</textarea>`
      }`;
    },
    canNext(s){return true;},
    onNext(s){if(!s.noDg)s.dg=document.getElementById("dg-ta")?.value.trim()||s.dg||"";}
  },
  // 3: Fach
  {
    id:"fach", eyebrow:"Schritt 4", question:"Welches Fach planst du?",
    sub:"Der passende Kernlehrplan NRW wird automatisch geladen.",
    render(s){
      return `<div class="step-grid step-grid-3">${Object.entries(FACH_DATA).map(([f,d])=>
        `<div class="step-option ${s.fach===f?'sel':''}" onclick="pickFach('${f}',this)" style="--fc:${d.color}${s.fach===f?';background:'+d.bg:''}">
          <div class="step-opt-icon">${d.emoji}</div>
          <div class="step-opt-label">${f}</div>
          <div class="step-opt-sub">${d.sub}</div>
        </div>`).join("")}</div>`;
    },
    canNext(s){return !!s.fach;}
  },
  // 4: Jahrgangsstufe
  {
    id:"jgst", eyebrow:"Schritt 5", question:"Welche Jahrgangsstufe unterrichtest du?",
    sub:"Die UVs aus deinem SILP werden gefiltert.",
    render(s){
      const opts=["5","6","7","8","9","10","EF","Q1","Q2"];
      return `<div class="step-grid step-grid-6">${opts.map(j=>
        `<div class="step-option ${s.jgst===j?'sel':''}" onclick="pickJg('${j}',this)">
          <div class="step-opt-label">${j}</div>
          <div class="step-opt-sub">${["EF","Q1","Q2"].includes(j)?"Sek II":"Klasse"}</div>
        </div>`).join("")}</div>`;
    },
    canNext(s){return !!s.jgst;}
  },
  // 5: SILP upload
  {
    id:"silp", eyebrow:"Schritt 6", question:"Unterrichtsvorhaben",
    sub:"",
    render(s){
      const hasUVs=s.uvs&&s.uvs.length>0;
      const hasEmbedded=!!(UV_DATA[s.fach]&&UV_DATA[s.fach][s.jgst]&&UV_DATA[s.fach][s.jgst].length);
      if(hasEmbedded&&!s.silpSrc&&!hasUVs){
        return `<div class="step-options">
          <div class="step-option" onclick="chooseSilpSrc('cfg')">
            <span class="step-opt-icon">📚</span>
            <div><div class="step-opt-label">CFG-SILP nutzen</div><div class="step-opt-sub">Hinterlegter Lehrplan für ${esc(s.fach)} · Jg. ${esc(s.jgst)}</div></div>
          </div>
          <div class="step-option" onclick="chooseSilpSrc('own')">
            <span class="step-opt-icon">📄</span>
            <div><div class="step-opt-label">Eigenen SILP hochladen</div><div class="step-opt-sub">PDF oder TXT eines eigenen Schulinternen Lehrplans</div></div>
          </div>
        </div>`;
      }
      const backLink=hasEmbedded?`<div style="font-size:.74rem;color:var(--blue);cursor:pointer;margin-bottom:.6rem;" onclick="resetSilpSrc()">◀ andere Quelle wählen</div>`:'';
      return `
        ${!hasUVs?`
          ${backLink}
          <div class="upload-zone" id="upload-zone" onclick="document.getElementById('silp-file').click()" style="margin-bottom:.8rem;">
            <div class="upload-icon">📄</div>
            <div class="upload-title">SILP als PDF oder TXT hochladen</div>
            <div class="upload-sub">Klicken oder hierher ziehen</div>
          </div>
          <input type="file" id="silp-file" accept=".pdf,.txt,.md" style="display:none" onchange="handleSILP(this)">
          <div id="silp-load" class="hidden"><div class="load-wrap"><div class="load-bar-outer"><div class="load-bar-inner"></div></div><div class="load-text" id="silp-load-text">Lade…</div><div class="load-sub" id="silp-load-sub"></div></div></div>
          <div id="silp-status" class="step-status"></div>
        `:''}
        ${hasUVs?`${backLink}<div style="max-height:260px;overflow-y:auto;display:flex;flex-direction:column;gap:.35rem;">${s.uvs.map(uv=>`
          <div class="step-option ${s.selUV&&s.selUV._uid===uv._uid?'sel':''}" onclick="stepSelUV('${uv._uid}')" style="flex-direction:column;align-items:flex-start;gap:.1rem;padding:.7rem .9rem;">
            <div class="step-opt-label" style="font-size:.83rem;line-height:1.4;">${esc(uv.titel)}</div>
            <div class="step-opt-sub">${esc(uv.bf||'')}${uv.std?' · '+uv.std+' Std.':''}</div>
          </div>`).join("")}</div>`:''}`;
    },
    canNext(s){return true;}, // can skip SILP
    onNext(s){/* handled by stepSelUV */}
  },
  // 6: Kompetenzen (nur wenn UV gewählt)
  {
    id:"comps", eyebrow:"Schritt 7", question:"Welche Kompetenzen planst du?",
    sub:"Wähle die relevanten Kompetenzen aus deinem SILP.",
    skip(s){return !s.selUV;},
    render(s){
      const uv=s.selUV; if(!uv)return"";
      const cats=uvKompCats(uv);
      let html="";
      cats.forEach(([l,items])=>{
        if(!items||!items.length)return;
        html+=`<div style="font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin:.5rem 0 .2rem;">${l}</div>`;
        items.forEach((c,i)=>{
          const sel=s.selC[l]&&s.selC[l].includes(c);
          html+=`<div class="step-option ${sel?'sel':''}" onclick="stepTogComp('${l}',${i},this)" style="padding:.5rem .75rem;gap:.55rem;">
            <span style="flex-shrink:0;font-size:.85rem;width:1.1rem;">${sel?'✓':'○'}</span>
            <span style="font-size:.8rem;line-height:1.45;">${esc(c)}</span>
          </div>`;
        });
      });
      html+=`<div style="margin-top:.7rem;"><div style="font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:.3rem;">Eigene Ergänzung</div>
        <textarea class="step-textarea" id="comp-custom-ta" rows="2" placeholder="Abweichende oder eigene Kompetenz…" style="margin-bottom:0;">${esc(s.compCustom||"")}</textarea></div>`;
      return html;
    },
    canNext(s){return true;},
    onNext(s){s.compCustom=document.getElementById("comp-custom-ta")?.value.trim()||s.compCustom||"";}
  },
  // 7: Lerngruppe
  {
    id:"lg", eyebrow:"Schritt 8", question:"Wer sitzt vor dir?",
    sub:"Wähle die zutreffenden Merkmale.",
    render(s){
      const selCh=s.lgCh||{};
      let html="";
      [["Klassengröße","size"],["Leistungsstand","leistung"],["Besonderheiten","beson"]].forEach(([label,cat])=>{
        html+=`<div style="font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin:.5rem 0 .28rem;">${label}</div>
          <div style="display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:.1rem;">
          ${LG_CHIPS[cat].map(o=>`<div class="chip ${(selCh[cat]||[]).includes(o)?'sel':''}" onclick="stepTogLG('${cat}','${o.replace(/'/g,"\\'")}',this,'${cat!=="beson"?'single':'multi'}')">${esc(o)}</div>`).join("")}</div>`;
      });
      html+=`<div style="margin-top:.7rem;"><div style="font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:.28rem;">Freie Ergänzung</div>
        <textarea class="step-textarea" id="lg-frei-ta" rows="2" placeholder="z.B. 2 SuS mit Förderbedarf, gutes Sozialklima…" style="margin-bottom:0;">${esc(s.lgFr||"")}</textarea></div>`;
      return html;
    },
    canNext(s){return true;},
    onNext(s){s.lgFr=document.getElementById("lg-frei-ta")?.value.trim()||s.lgFr||"";}
  }
];

function saveSessions(){
  try{localStorage.setItem("ub_sessions",JSON.stringify({sessions,activeId}));}catch(e){}
  pushCloudState();
}
function loadSessions(){
  try{
    const raw=localStorage.getItem("ub_sessions");
    if(!raw)return false;
    const d=JSON.parse(raw);
    if(!d.sessions||!d.sessions.length)return false;
    sessions=d.sessions;
    activeId=sessions.find(s=>s.id===d.activeId)?d.activeId:sessions[0].id;
    return true;
  }catch(e){return false;}
}

// REIHEN (Reihenplanung)
// ═══════════════════════════════════════════════════
function saveReihen(){
  try{localStorage.setItem("ub_reihen",JSON.stringify({reihen,activeReihenId}));}catch(e){}
  pushCloudState();
}
function loadReihen(){
  try{
    const raw=localStorage.getItem("ub_reihen");
    if(!raw)return;
    const d=JSON.parse(raw);
    reihen=d.reihen||[];
    activeReihenId=reihen.find(r=>r.id===d.activeReihenId)?d.activeReihenId:null;
  }catch(e){}
}

function mkStunde(titel){return {id:"st"+Date.now()+Math.random().toString(36).slice(2,6),titel:titel||"",kurz:"",planungId:null};}

function newReihe(){
  const id="r"+Date.now();
  reihen.push({id,name:"Neue Reihe",fach:null,jgst:null,stunden:[mkStunde("")]});
  switchReihe(id);
}

function switchReihe(id){
  currentMode="reihe"; activeReihenId=id; saveReihen(); renderSB(); showReiheEditor();
}

function delReihe(id,e){
  e.stopPropagation();
  reihen=reihen.filter(r=>r.id!==id);
  saveReihen();
  if(activeReihenId===id){
    activeReihenId=null;
    if(sessions.length){switchSession(activeId||sessions[0].id);}
  }
  renderSB();
}

function renameReiheField(field,val){const r=R();if(r){r[field]=val;saveReihen();}}

function reiheSetFach(f,el){
  const r=R();if(!r)return; r.fach=f; r.klp=KLP[f]||"";
  el.closest("#reihe-area").querySelectorAll(".fach-card").forEach(o=>{o.classList.remove("sel");o.style.background="";});
  el.classList.add("sel");
  saveReihen();
}
function reiheSetJg(j,el){
  const r=R();if(!r)return; r.jgst=j;
  el.closest("#reihe-area").querySelectorAll(".jg-chip").forEach(o=>o.classList.remove("sel"));
  el.classList.add("sel");
  saveReihen();
}

function addStunde(){
  const r=R();if(!r)return;
  r.stunden.push(mkStunde(""));
  saveReihen(); renderReiheEditor();
}
function removeStunde(idx){
  const r=R();if(!r)return;
  if(r.stunden.length<=1){alert("Mindestens eine Stunde.");return;}
  r.stunden.splice(idx,1);
  saveReihen(); renderReiheEditor();
}
function moveStunde(idx,dir){
  const r=R();if(!r)return;
  const j=idx+dir;
  if(j<0||j>=r.stunden.length)return;
  [r.stunden[idx],r.stunden[j]]=[r.stunden[j],r.stunden[idx]];
  saveReihen(); renderReiheEditor();
}
function editStunde(idx,field,val){
  const r=R();if(!r||!r.stunden[idx])return;
  r.stunden[idx][field]=val;
  saveReihen();
}

// Erstellt (oder öffnet, falls schon vorhanden) die volle Einzelplanung für
// eine Stunde aus der Reihen-Outline, inkl. Kontext zu Vorgänger/Nachfolger
// für eine kohärente VERORTUNG.
function planReiheStunde(idx){
  const r=R();if(!r)return;
  const st=r.stunden[idx];if(!st)return;
  if(st.planungId&&sessions.find(s=>s.id===st.planungId)){
    switchSession(st.planungId);
    return;
  }
  const id="s"+Date.now();
  const s=mkSessionObj(id);
  s.name=st.titel||("Stunde "+(idx+1));
  s.fach=r.fach; s.jgst=r.jgst; s.klp=r.klp||KLP[r.fach]||"";
  s.reiheCtx={reiheId:r.id,name:r.name,position:idx+1,total:r.stunden.length,prevTitel:r.stunden[idx-1]?r.stunden[idx-1].titel:"",nextTitel:r.stunden[idx+1]?r.stunden[idx+1].titel:""};
  sessions.push(s);
  st.planungId=id;
  saveReihen(); saveSessions();
  switchSession(id);
}

// "Umgekehrt": eine bestehende, schon geplante Stunde nachträglich in eine
// Reihe einordnen (an letzter Position anhängen).
function assignSessionToReihe(reiheId){
  const s=S();const r=reihen.find(x=>x.id===reiheId);
  if(!s||!r)return;
  const st=mkStunde(s.name);
  st.planungId=s.id;
  r.stunden.push(st);
  if(!r.fach)r.fach=s.fach;
  if(!r.jgst)r.jgst=s.jgst;
  s.reiheCtx={reiheId:r.id,name:r.name,position:r.stunden.length,total:r.stunden.length,prevTitel:r.stunden.length>1?r.stunden[r.stunden.length-2].titel:"",nextTitel:""};
  saveReihen(); saveSessions();
  alert(`Zu „${r.name}" hinzugefügt ✓`);
  renderResults();
}

  document.getElementById("tb-meta").textContent="Reihenplanung";
  document.getElementById("tb-title").textContent=r.name;

  document.getElementById("prog-fill").style.width="0%";
  const planned=r.stunden.filter(st=>st.planungId).length;
  document.getElementById("reihe-area").innerHTML=`
    <div class="res-card fu">
      <div class="res-card-body" style="padding-top:1rem;">
        <div class="s-label" style="margin-bottom:.3rem;">Titel der Reihe</div>
        <input class="dg-input" style="margin-bottom:1rem;" value="${esc(r.name)}" onblur="renameReiheField('name',this.value.trim()||'Neue Reihe');renderSB();" onkeydown="if(event.key==='Enter')this.blur();">
        <div class="s-label" style="margin-bottom:.5rem;">Fach</div>
        <div class="fach-grid" style="margin-bottom:1rem;">${Object.entries(FACH_DATA).map(([f,d])=>
          `<div class="fach-card ${r.fach===f?'sel':''}" style="--fc:${d.color}${r.fach===f?';background:'+d.bg:''}" onclick="reiheSetFach('${f}',this)">
            <div class="fc-emoji">${d.emoji}</div><div class="fc-name">${f}</div>
          </div>`).join("")}</div>
        <div class="s-label" style="margin-bottom:.5rem;">Jahrgangsstufe</div>
        <div class="jgst-grid" style="margin-bottom:.5rem;">${["5","6","7","8","9","10","EF","Q1","Q2"].map(j=>
          `<div class="jg-chip ${r.jgst===j?'sel':''}" onclick="reiheSetJg('${j}',this)">${j}</div>`).join("")}</div>
      </div>
    </div>
    <div class="res-card fu">
      <div class="res-card-head">Stundenübersicht · ${planned}/${r.stunden.length} ausgeplant</div>
      <div class="res-card-body" style="padding:.6rem .9rem;display:flex;flex-direction:column;gap:.5rem;">
        ${r.stunden.map((st,i)=>`
          <div class="uv-card" style="padding:.65rem .8rem;">
            <div style="display:flex;gap:.5rem;align-items:flex-start;">
              <div style="flex-shrink:0;display:flex;flex-direction:column;gap:.15rem;padding-top:.3rem;">
                <button class="qa-nav-btn" style="width:22px;height:22px;font-size:.65rem;" onclick="moveStunde(${i},-1)" ${i===0?"disabled":""}>▲</button>
                <button class="qa-nav-btn" style="width:22px;height:22px;font-size:.65rem;" onclick="moveStunde(${i},1)" ${i===r.stunden.length-1?"disabled":""}>▼</button>
              </div>
              <div style="flex:1;min-width:0;">
                <div style="font-size:.68rem;font-weight:700;color:var(--text3);margin-bottom:.25rem;">STUNDE ${i+1}${st.planungId?" · ✓ ausgeplant":""}</div>
                <input class="dg-input" style="margin-bottom:.35rem;padding:.4rem .6rem;font-size:.85rem;" placeholder="Thema der Stunde…" value="${esc(st.titel)}" onblur="editStunde(${i},'titel',this.value.trim())" onkeydown="if(event.key==='Enter')this.blur();">
                <textarea class="custom-comp-input" rows="1" placeholder="Kurznotiz (optional)…" onblur="editStunde(${i},'kurz',this.value.trim())">${esc(st.kurz)}</textarea>
              </div>
              <div style="flex-shrink:0;display:flex;flex-direction:column;gap:.3rem;">
                <button class="btn-ghost" style="font-size:.72rem;padding:.32rem .6rem;white-space:nowrap;" onclick="planReiheStunde(${i})">${st.planungId?"Öffnen →":"Ausplanen →"}</button>
                <button class="sess-del" style="opacity:1;" onclick="removeStunde(${i})">✕</button>
              </div>

function mkSessionObj(id){
  return {id,name:"Neue Planung",typ:null,ubNr:"1",dg:"",noDg:false,fach:null,jgst:null,klp:"",uvs:[],silpSrc:null,selUV:null,selC:{bwk:[],mk:[],uk:[]},compCustom:"",lgCh:{size:[],leistung:[],beson:[]},lgFr:"",exchanges:[],apiH:[],curQ:null,phase:0,done:false,psum:[],devR:0,devN:"",result:null,curStep:0,reiheCtx:null};
}

function newSession(){
  const id="s"+Date.now();
  sessions.push(mkSessionObj(id));
  switchSession(id);
}

function switchSession(id){
  currentMode="session"; activeId=id; saveSessions(); renderSB();
  const s=S();
  if(s.done){showRes();}
  else if(s.phase>0||s.curQ){showQA();}
  else{curStep=resumeStep(s);showStepScreen();}
  upHdr();
}

function firstStep(s){
  // Find first step that isn't done yet
  for(let i=0;i<STEPS.length;i++){
    if(STEPS[i].skip&&STEPS[i].skip(s))continue;
    if(!stepDone(s,i))return i;
  }
  return 0;
}

// Resume exactly where the user left off (the real step they were on),
// falling back to the "first undone step" heuristic only for sessions
// saved before curStep was tracked, or if that step no longer applies.
function resumeStep(s){
  if(typeof s.curStep==="number"&&STEPS[s.curStep]&&!(STEPS[s.curStep].skip&&STEPS[s.curStep].skip(s))){
    return s.curStep;
  }
  return firstStep(s);
}

function stepDone(s,i){
  const step=STEPS[i];
  switch(step.id){
    case"typ":return!!s.typ;
    case"ubnr":return true;
    case"dg":return true;
    case"fach":return!!s.fach;
    case"jgst":return!!s.jgst;
    case"silp":return true;
    case"comps":return true;
    case"lg":return false; // always re-ask
    default:return false;
  }
}

function delSess(id,e){
  e.stopPropagation();
  if(sessions.length===1){alert("Mindestens eine Planung.");return;}
  sessions=sessions.filter(x=>x.id!==id);
  if(activeId===id){activeId=sessions[0].id;switchSession(activeId);}
  saveSessions();
  renderSB();
}

function renderSB(){
  document.getElementById("sb-list").innerHTML=sessions.map(s=>`
    <div class="sess ${currentMode==="session"&&s.id===activeId?"active":""} ${s.done?"done":""}" onclick="switchSession('${s.id}')">
      <div class="sess-dot"></div>
      <div class="sess-info">
        <span class="sess-name" id="sn-${s.id}" onclick="renSess('${s.id}',event)">${esc(s.name)}</span>
        ${s.fach?`<div class="sess-sub">${esc(s.fach)}${s.jgst?" · "+jgstShort(s.jgst):""}${s.reiheCtx?" · ↳ "+esc(s.reiheCtx.name):""}</div>`:""}
      </div>
      <button class="sess-del" onclick="delSess('${s.id}',event)">✕</button>
    </div>`).join("");
  document.getElementById("sb-list-reihen").innerHTML=reihen.map(r=>{
    const planned=r.stunden.filter(st=>st.planungId).length;
    return `<div class="sess ${currentMode==="reihe"&&r.id===activeReihenId?"active":""}" onclick="switchReihe('${r.id}')">
      <span style="flex-shrink:0;font-size:.85rem;">📚</span>
      <div class="sess-info">
        <span class="sess-name">${esc(r.name)}</span>
        <div class="sess-sub">${r.fach?esc(r.fach)+" · ":""}${planned}/${r.stunden.length} ausgeplant</div>
      </div>
      <button class="sess-del" onclick="delReihe('${r.id}',event)">✕</button>
    </div>`;
  }).join("");
}

function renSess(id,e){
  e.stopPropagation();
  const el=document.getElementById("sn-"+id);if(!el)return;
  const old=el.textContent;
  const inp=document.createElement("input");
  inp.className="sess-name-input";inp.value=old;
  el.replaceWith(inp);inp.focus();inp.select();
  const done=()=>{const s=sessions.find(x=>x.id===id);if(s)s.name=inp.value.trim()||old;saveSessions();renderSB();upHdr();};
  inp.addEventListener("blur",done);
  inp.addEventListener("keydown",ev=>{if(ev.key==="Enter"){ev.preventDefault();inp.blur();}if(ev.key==="Escape"){inp.value=old;inp.blur();}});
}

// ═══════════════════════════════════════════════════
// HEADER
// ═══════════════════════════════════════════════════
function upHdr(){
  const s=S();if(!s)return;
  const ph=s.typ==="ub"?PH_UB:PH_NORM;
  const inSetup=!s.done&&s.phase===0&&!s.curQ;
  if(inSetup){
    const visSteps=STEPS.filter(st=>!(st.skip&&st.skip(s)));
    const stepNum=visSteps.findIndex(st=>st===STEPS[curStep])+1;
    document.getElementById("tb-meta").textContent=s.fach?s.fach+(s.jgst?" · "+jgstShort(s.jgst):""):"Einrichtung";
    document.getElementById("tb-title").textContent=STEPS[curStep]?.question||"Neue Planung";
    // Progress dots = visible steps
    document.getElementById("phase-dots").innerHTML=visSteps.map((st,i)=>
      `<div class="pdot ${i<stepNum-1?"done":i===stepNum-1?"active":""}" onclick="jumpStep(${STEPS.indexOf(st)})" title="${st.eyebrow}"><span class="pdot-label">${st.eyebrow}</span></div>`).join("");
    const pct=Math.round(((stepNum-1)/visSteps.length)*100);
    document.getElementById("prog-fill").style.width=pct+"%";
  } else {
    const i=Math.min(s.phase,ph.length-1);
    document.getElementById("tb-meta").textContent=`${s.fach||""} · ${s.typ==="ub"?ubLabel(s.ubNr):"Stunde"}${s.jgst?" · "+jgstShort(s.jgst):""}`;
    document.getElementById("tb-title").textContent=s.done?"Planung abgeschlossen ✓":ph[i];
    document.getElementById("phase-dots").innerHTML=ph.map((_,j)=>
      `<div class="pdot ${j<s.phase?"done":j===s.phase&&!s.done?"active":""}" onclick="jumpToPhase(${j})" title="${ph[j]}"><span class="pdot-label">${ph[j]}</span></div>`).join("");
    const pct=s.done?100:Math.round((s.phase/ph.length)*100);
    document.getElementById("prog-fill").style.width=pct+"%";
  }
}

function jumpStep(i){
  if(i<curStep){curStep=i;const s=S();if(s){s.curStep=i;saveSessions();}renderStep();}
}

function renderStep(){
  const s=S();
  const step=STEPS[curStep];
  if(!step)return;
  const visSteps=STEPS.filter(st=>!(st.skip&&st.skip(s)));
  const stepNum=visSteps.indexOf(step)+1;
  const total=visSteps.length;
  const wrap=document.getElementById("step-wrap");
  wrap.innerHTML=`
    <div class="step-card">
      <div class="step-eyebrow">${step.eyebrow} von ${total}</div>
      <div class="step-question">${step.question}</div>
      ${step.sub?`<div class="step-sub">${step.sub}</div>`:""}
      <div id="step-body">${step.render(s)}</div>
      <div class="step-footer">
        <div class="step-counter">${stepNum} / ${total}</div>
        <div class="step-nav">
          ${curStep>0?`<button class="step-back" onclick="stepBack()">← Zurück</button>`:""}
          <button class="step-next" id="step-next-btn" onclick="stepNext()" ${step.canNext(s)?"":" disabled"}>
            ${curStep===STEPS.length-1?"Planung starten →":"Weiter →"}
          </button>
        </div>
      </div>
    </div>`;
  upHdr();
  // Re-attach drag&drop for SILP step
  if(step.id==="silp"){
    const uz=document.getElementById("upload-zone");
    if(uz){
      uz.addEventListener("dragover",e=>{e.preventDefault();uz.classList.add("drag");});
      uz.addEventListener("dragleave",()=>uz.classList.remove("drag"));
      uz.addEventListener("drop",e=>{e.preventDefault();uz.classList.remove("drag");const f=e.dataTransfer.files[0];if(f){const inp=document.getElementById("silp-file");const dt=new DataTransfer();dt.items.add(f);inp.files=dt.files;handleSILP(inp);}});
    }
  }
}

function refreshNextBtn(){
  const s=S(); const step=STEPS[curStep];
  const btn=document.getElementById("step-next-btn");
  if(btn)btn.disabled=!step.canNext(s);
}

function stepNext(){
  const s=S(); const step=STEPS[curStep];
  if(!step.canNext(s))return;
  if(step.onNext)step.onNext(s);
  // Find next non-skipped step
  let next=curStep+1;
  while(next<STEPS.length&&STEPS[next].skip&&STEPS[next].skip(s))next++;
  if(next>=STEPS.length){
    // All steps done — start planning
    if(!s.name||s.name==="Neue Planung")s.name=(s.selUV?s.selUV.titel.slice(0,38)+"…":s.fach+" · "+jgstShort(s.jgst));
    saveSessions();
    renderSB();showQA();upHdr();startAgent();
  } else {
    curStep=next;s.curStep=next;saveSessions();renderStep();
  }
}

function stepBack(){
  const s=S();
  let prev=curStep-1;
  while(prev>=0&&STEPS[prev].skip&&STEPS[prev].skip(s))prev--;
  if(prev>=0){curStep=prev;s.curStep=prev;saveSessions();renderStep();}
}

// Returns [[label, items[]], ...] for a UV's competencies, regardless of subject.
// New subjects use uv.komp = {"SK":[...], "MK":[...], ...}; the original Sport
// data predates that schema and stores bwk/mk/uk as separate fields, so it's
// synthesized into the same shape here.
function uvKompCats(uv){
  if(uv.komp) return Object.entries(uv.komp);
  return [["BWK",uv.bwk||[]],["MK",uv.mk||[]],["UK",uv.uk||[]]];
}
function uvKompItems(uv,label){
  if(uv.komp) return uv.komp[label]||[];
  return uv[label.toLowerCase()]||[];
}

function stepSelUV(uid){

    el.classList.toggle("sel",el.getAttribute("onclick").includes(uid));

}

function stepTogComp(key,idx,el){
  const s=S(); if(!s.selUV||!s.selC)return;
  const comp=uvKompItems(s.selUV,key)[idx]; if(comp===undefined)return;
  if(!s.selC[key])s.selC[key]=[];

  else{s.selC[key].push(comp);el.classList.add("sel");el.querySelector("span").textContent="✓";}
  saveSessions();
}

async function handleSILP(inp){
  const file=inp.files[0];if(!file)return;
  const s=S();
  const uz=document.getElementById("upload-zone");
  if(uz)uz.classList.add("has-file");
  showSilpLoad("Schritt 1/3: Lese PDF…","");

  try{
    const raw=await new Promise((res,rej)=>{
      const rd=new FileReader();
      rd.onload=e=>res(e.target.result); rd.onerror=rej;
      if(file.name.toLowerCase().endsWith(".pdf"))rd.readAsArrayBuffer(file);
      else rd.readAsText(file);
    });

    let reply="";
    if(file.name.toLowerCase().endsWith(".pdf")){
      const bytes=new Uint8Array(raw); let bin="";
      for(let i=0;i<bytes.length;i+=1024)bin+=String.fromCharCode.apply(null,bytes.subarray(i,Math.min(i+1024,bytes.length)));
      const b64=btoa(bin);
      showSilpLoad("Schritt 2/3: Analysiere mit KI…",(b64.length/1024/1024).toFixed(1)+" MB · Klasse "+s.jgst);
      const data=await callProxy({max_tokens:4096,beta:"pdfs-2024-09-25",messages:[{role:"user",content:[
        {type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}},
        {type:"text",text:`Analysiere diesen SILP und extrahiere NUR die UVs der Jahrgangsstufe ${s.jgst}.

Antworte AUSSCHLIESSLICH mit einem JSON-Array. Beginne mit [ und ende mit ].

Format:
[{"jg":${s.jgst},"nr":"2.1","bf":"BF2 Das Spielen entdecken","bf_short":"BF2","std":20,"titel":"Vollständiger UV-Titel","if_":["e"],"bwk":["BWK-Kompetenz 1","BWK-Kompetenz 2"],"mk":["MK 1"],"uk":["UK 1"]}]

Fehlende Felder als leere Arrays [].`}
      ]}]});
      reply=data.content.filter(b=>b.type==="text").map(b=>b.text).join("");
    } else {
      const txt=raw;
      showSilpLoad("Schritt 2/3: Extrahiere UVs…","");
      const data=await callProxy({max_tokens:4096,messages:[{role:"user",content:`JSON-Array aller UVs der Klasse ${s.jgst} (nur JSON, beginne mit [):\n${txt.slice(0,9000)}`}]});
      reply=data.content.filter(b=>b.type==="text").map(b=>b.text).join("");
    }

    showSilpLoad("Schritt 3/3: Verarbeite…","");
    let uvs=extractJSON(reply);

    if(!uvs){
      const rd=await callProxy({max_tokens:4096,messages:[{role:"user",content:`Konvertiere in valides JSON-Array (nur JSON, beginne mit [):\n${reply.slice(0,3000)}`}]});
      uvs=extractJSON(rd.content.filter(b=>b.type==="text").map(b=>b.text).join(""));
    }

    hideSilpLoad();
    if(uvs&&uvs.length>0){
      s._uvMap={};
      uvs.forEach((uv,i)=>{uv._uid="uv"+i;s._uvMap["uv"+i]=uv;});
      s.uvs=uvs;
      saveSessions();
      setSilpStatus("ok","✓ "+uvs.length+" UVs für Klasse "+s.jgst+" extrahiert — bitte UV auswählen:");
      // Re-render step to show UV list
      renderStep();
    } else {
      throw new Error("Keine UVs gefunden.");
    }
  }catch(err){
    hideSilpLoad();
    console.error("SILP:",err);
    setSilpStatus("err","⚠️ "+err.message);
  }
}

function extractJSON(text){
  if(!text)return null;
  let t=text.replace(/```json\s*/gi,"").replace(/```\s*/g,"").trim();
  try{const a=JSON.parse(t);if(Array.isArray(a)&&a.length)return a;}catch(e){}
  const s=t.indexOf("["),e=t.lastIndexOf("]");
  if(s>=0&&e>s){try{const a=JSON.parse(t.slice(s,e+1));if(Array.isArray(a)&&a.length)return a;}catch(e){}}
  try{
    const objs=[]; let depth=0,inStr=false,esc_=false,start=-1;
    for(let i=0;i<t.length;i++){
      const c=t[i];
      if(esc_){esc_=false;continue;}if(c==="\\"&&inStr){esc_=true;continue;}
      if(c==='"'){inStr=!inStr;continue;}if(inStr)continue;
      if(c==="{"){if(!depth)start=i;depth++;}
      if(c==="}"){depth--;if(!depth&&start>=0){try{objs.push(JSON.parse(t.slice(start,i+1)));}catch(e){}start=-1;}}
    }
    if(objs.length)return objs;
  }catch(e){}
  return null;
}

function bldSys(){
  const s=S(); const isUB=s.typ==="ub";
  const lg=[s.jgst?(["EF","Q1","Q2"].includes(s.jgst)?"Stufe "+s.jgst:"Klasse "+s.jgst):"",...(s.lgCh.size||[]),...(s.lgCh.leistung||[]),...(s.lgCh.beson||[])?["Besonderheiten: "+(s.lgCh.beson||[]).join(", ")]:[],s.lgFr||""].filter(Boolean).join(" · ")||"nicht angegeben";
  const compLines=s.selUV?uvKompCats(s.selUV).filter(([,items])=>items&&items.length).map(([label])=>`${label}: ${((s.selC&&s.selC[label])||[]).join(" | ")||"alle"}`).join("\n"):"";
  const comp=s.selUV?`\nGewählte Kompetenzen:\n${compLines}${s.compCustom?"\nEig.: "+s.compCustom:""}`:""
  const uvCtx=s.selUV?`\nUV: ${s.selUV.titel} · ${s.selUV.bf||""} · IF: ${(s.selUV.if_||[]).join(",")} · ${s.selUV.std||"?"} Std.${comp}`:"Freie Planung.";
  const reiheCtx=s.reiheCtx?`\nREIHENKONTEXT: Teil der Reihe „${s.reiheCtx.name}", Stunde ${s.reiheCtx.position} von ${s.reiheCtx.total}. Davor: ${s.reiheCtx.prevTitel||"–"}. Danach: ${s.reiheCtx.nextTitel||"–"}. Nutze das direkt für VERORTUNG — nicht nochmal danach fragen.`:"";
  const dep=isUB?(s.ubNr==="upp"?"Das ist die Unterrichtspraktische Prüfung (UPP) im Rahmen der Staatsprüfung — fordere höchste Präzision, prüfe Kohärenz und Prüfungsreife kritisch.":s.ubNr<=1?"Frage einfach und direkt.":s.ubNr<=3?"Hake bei unscharfen Antworten nach.":"Fordere Präzision, prüfe Kohärenz kritisch."):"";
  const pUB=`PHASEN (7, UB):\n1.VORHABEN: Kompetenzziel Reihe (aktives Verb+Inhalt) · Stundenanzahl · Erkennbarkeit. Lerngruppe/UV bekannt — nicht nochmal fragen.\n2.VERORTUNG: Stunde Nr./von · davor · danach · Funktion · warum jetzt zwingend\n3.GEGENSTAND→THEMA: Gegenstand (nicht didaktisch reduziert) · Intention · Thema=Gegenstand+Intention\n4.KERNANLIEGEN: Dreiteilig: Unterrichtsaktivität + konkrete Fähigkeit + Kompetenzaufbau. Harter Operator (benennen/beschreiben/erläutern/beurteilen/demonstrieren — NICHT kennen/wissen).\n5.TEILLERNZIELE: Wissen · Können · Erleben · zentrales TLZ?\n6.KOHÄRENZ: Kernanliegen→Reihenziel · Verortung zwingend? · TLZ stimmig? · Reflexionsfragen (offen, SuS-aktivierend)\n7.MITTAGESSEN-TEST: Kind-Satz in Jugendsprache · deckt zentrales TLZ ab?`;
  const pNorm=`PHASEN (3, Normale Stunde):\n1.LERNGRUPPE & ZIEL: Stundenziel (konkret, beobachtbar) · Einbettung in Reihe\n2.STUNDENSTRUKTUR: Einstieg · Erarbeitung · Reflexion\n3.REFLEXIONSFRAGEN: 2–3 offene Fragen für die Reflexionsphase`;
  const dgLine=s.noDg?"ENTWICKLUNGSZIEL: keins — reine Planungshilfe ohne besonderen Entwicklungsschwerpunkt, dazu nichts erfragen.":`ENTWICKLUNGSZIEL: ${s.dg||"Gesprächs- und Reflexionsphasen verbessern"}`;
  const haltung=`HALTUNG: Urteile ausschließlich nach fachwissenschaftlichen und fachdidaktischen Standards (KLP NRW, aktueller fachdidaktischer Konsens) — nicht danach, was die planende Person hören will. Widersprich unpräzisen, fachlich unbegründeten oder didaktisch fragwürdigen Aussagen konsequent und benenne warum, auch bei Widerspruch oder Insistieren. Diese Kriterien und dein Anspruchsniveau bleiben über das gesamte Gespräch identisch — kein Nachgeben, kein beschwichtigendes Zustimmen.`;
  return `Du bist Ausbildungslehrer ${s.fach} Gymnasium NRW.\n\n${haltung}\n\nKLP ${s.fach}:\n${s.klp||KLP[s.fach]||""}\n\nJahrgangsstufe: ${s.jgst||"?"}\n${uvCtx}${reiheCtx}\nLERNGRUPPE: ${lg}\n${dgLine}\nART: ${isUB?(s.ubNr==="upp"?"Unterrichtspraktische Prüfung (UPP)":s.ubNr+". Unterrichtsbesuch"):"Normale Stunde"}\n${dep}\n\nAUFGABE: Strukturiertes Planungsgespräch. Pro Nachricht NUR EINE Frage.\n\n${isUB?pUB:pNorm}\n\nPHASENABSCHLUSS: [PE:N] und [SUM:Punkt1|Punkt2|Punkt3] am Anfang.\n\nTIPP: Bei Tipp-Anfragen: 2–3 Sätze Praxistipp für ${s.fach}, dann Frage erneut.\n\nABSCHLUSS — nur JSON:\n{"type":"result","kind":"...","eroeffnung":"...","reflexion":"...","hinweise":"..."}\n\nSonst JSON: {"type":"question","phase":N,"question":"...","hint":"...","feedback":"..."}\n\nNur gültiges JSON (außer bei PE/SUM). Per Du.`;
}

async function startAgent(){
  const s=S(); s.exchanges=[];s.apiH=[];s.phase=0;s.curQ=null;s.psum=[];
  setInp(false); renderThread();
  try{
    const r=await callAPI([{role:"user",content:"Starte. Lerngruppe und UV bekannt. Direkt mit Phase 1."}],700);
    s.apiH=[{role:"user",content:"Starte. Lerngruppe und UV bekannt. Direkt mit Phase 1."},{role:"assistant",content:r}];
    procReply(r);
  }catch(e){s.curQ={type:"question",phase:0,question:"Fehler: "+e.message,hint:"",feedback:""};saveSessions();}
  renderThread(); setInp(true);
}

async function sendAnswer(){
  const ta=document.getElementById("ci"); const ans=ta.value.trim(); if(!ans)return;
  const s=S(); if(!s||!s.curQ)return;
  ta.value=""; ar(ta);
  s.exchanges.push({q:s.curQ.question,a:ans,fb:"",tip:null});
  s.curQ=null; s.apiH.push({role:"user",content:ans});
  setInp(false); renderThread();
  try{
    const r=await callAPI(s.apiH,900);
    s.apiH.push({role:"assistant",content:r}); procReply(r);
  }catch(e){s.curQ={type:"question",phase:s.phase,question:"Fehler: "+e.message,hint:"",feedback:""};saveSessions();}
  renderThread(); setInp(true);
}

function procReply(raw){
  const s=S();
  const pe=raw.match(/\[PE:(\d+)\]/); const sm=raw.match(/\[SUM:([^\]]+)\]/);
  let cr=raw.replace(/\[PE:\d+\]/g,"").replace(/\[SUM:[^\]]+\]/g,"").trim();
  if(pe){const n=parseInt(pe[1]);const items=sm?sm[1].split("|").map(x=>x.trim()):[];s.psum.push({phase:n,items});if(n>s.phase)s.phase=n;upHdr();}
  try{
    const d=JSON.parse(cr.replace(/```json|```/g,"").trim());
    if(d.type==="result"){
      s.result=d;s.done=true;const ph=s.typ==="ub"?PH_UB:PH_NORM;s.phase=ph.length;
      saveSessions();
      renderSB();showRes();return;
    }
    if(d.feedback&&s.exchanges.length>0)s.exchanges[s.exchanges.length-1].fb=d.feedback;
    s.curQ=d;
    if(typeof d.phase==="number"&&d.phase>s.phase)s.phase=d.phase;
    upHdr();
  }catch(e){s.curQ={type:"question",phase:s.phase,question:cr.slice(0,500),hint:"",feedback:""};}
  saveSessions();
}

function renderThread(){
  const s=S();
  const ph=s.typ==="ub"?PH_UB:PH_NORM;
  const phIdx=Math.min(s.phase,ph.length-1);

  // ── NAV BAR ──────────────────────────────────────────────────────
  const nav=document.getElementById("qa-nav");
  if(nav) nav.innerHTML=`
    <button class="qa-nav-btn" onclick="navPhase(-1)" ${s.phase===0?"disabled":""}>←</button>
    <div class="qa-phase-label">${esc(ph[phIdx]||"")}</div>
    <button class="qa-nav-btn" onclick="navPhase(1)" ${s.phase>=s.psum.length?"disabled":""}>→</button>
    <button class="btn-ghost" style="font-size:.71rem;padding:.24rem .62rem;margin-left:.5rem;" onclick="backToSetup()">⚙ Setup</button>`;

  // ── HERO: current question ────────────────────────────────────────
  const hero=document.getElementById("qa-hero");
  if(hero){
    if(s.curQ){
      hero.innerHTML=`<div class="q-card">
        <div class="q-label">Phase ${s.phase+1} · ${esc(ph[phIdx]||"")}</div>
        <div class="q-text">${esc(s.curQ.question)}</div>
        ${s.curQ.hint?`<div class="q-hint">${esc(s.curQ.hint)}</div>`:""}
        <button class="q-tip-btn" onclick="askTip()">💡 Tipp zur Umsetzung</button>
      </div>`;
    } else {
      hero.innerHTML=`<div class="q-card" style="display:flex;align-items:center;gap:.7rem;padding:1.1rem 1.4rem;">
        <div class="t-bubble"><span class="td"></span><span class="td"></span><span class="td"></span></div>
        <span style="font-size:.82rem;color:var(--text2);">Agent denkt nach…</span>
      </div>`;
    }
  }

  // ── HISTORY ACCORDION ─────────────────────────────────────────────
  const hist=document.getElementById("qa-history");
  if(!hist) return;

  const totalItems=s.exchanges.length+s.psum.length;
  if(totalItems===0){hist.innerHTML="";return;}

  const isOpen=hist.dataset.open!=="false"; // default open
  hist.innerHTML=`
    <div class="history-toggle" onclick="toggleHistory()">
      <span class="history-toggle-icon ${isOpen?"open":""}">▶</span>
      <span>Gesprächsverlauf (${totalItems} ${totalItems===1?"Eintrag":"Einträge"})</span>
      <span class="history-toggle-line"></span>
    </div>
    <div class="history-items ${isOpen?"open":""}">
      ${buildHistoryHTML(s,ph)}
    </div>`;

  // scroll to bottom
  const c=document.getElementById("content");
  if(c) c.scrollTop=c.scrollHeight;
  if(s.curQ) setTimeout(()=>{const ci=document.getElementById("ci");if(ci)ci.focus();},80);
}

function buildHistoryHTML(s,ph){
  let html="";
  // Merge exchanges and phase summaries in order
  let exIdx=0;
  for(const ps of s.psum){
    // Show exchanges that belong to this phase first
    while(exIdx<s.exchanges.length){
      const ex=s.exchanges[exIdx];
      html+=`<div class="exchange fu">
        <div class="ex-q">${esc(ex.q)}</div>
        <div class="ex-a">${esc(ex.a)}</div>
        ${ex.fb?`<div class="ex-fb">✓ ${esc(ex.fb)}</div>`:""}
      </div>`;
      exIdx++;
      if(exIdx>=s.exchanges.length) break;
    }
    // Phase summary card
    const phName=ph[ps.phase-1]||"Phase "+ps.phase;
    html+=`<div class="phase-sum">
      <div class="ps-head">
        <span class="ps-badge">Phase ${ps.phase} ✓</span>
        <span class="ps-title">${esc(phName)}</span>
      </div>
      ${ps.items.length?`<div class="ps-items">${ps.items.map(x=>`<div class="ps-item">${esc(x)}</div>`).join("")}</div>`:""}
    </div>`;
  }
  // Remaining exchanges
  while(exIdx<s.exchanges.length){
    const ex=s.exchanges[exIdx];
    html+=`<div class="exchange fu">
      <div class="ex-q">${esc(ex.q)}</div>
      <div class="ex-a">${esc(ex.a)}</div>
      ${ex.fb?`<div class="ex-fb">✓ ${esc(ex.fb)}</div>`:""}
    </div>`;
    exIdx++;
  }
  // Tip outputs
  s.exchanges.filter(e=>e.tip).forEach(e=>{
    html+=`<div class="tip-out">💡 ${esc(e.tip)}</div>`;
  });
  return html;
}

function toggleHistory(){
  const hist=document.getElementById("qa-history");
  if(!hist)return;
  const items=hist.querySelector(".history-items");
  const icon=hist.querySelector(".history-toggle-icon");
  const isOpen=items.classList.contains("open");
  items.classList.toggle("open",!isOpen);
  if(icon)icon.classList.toggle("open",!isOpen);
  hist.dataset.open=String(!isOpen);
}


function navPhase(dir){
  const s=S(); if(!s)return;
  const ph=s.typ==="ub"?PH_UB:PH_NORM;
  const np=Math.max(0,Math.min(s.psum.length,s.phase+dir));
  if(np!==s.phase){s.phase=np;upHdr();renderThread();saveSessions();}
}

function jumpToPhase(j){const s=S();if(!s||j>s.psum.length)return;s.phase=j;upHdr();renderThread();saveSessions();}

function backToSetup(){
  const s=S(); if(!s)return;
  curStep=0; s.curStep=0; saveSessions(); showStepScreen();
}

async function askTip(){
  const s=S(); if(!s||!s.curQ)return;
  const tb=document.querySelector(".q-tip-btn"); if(!tb)return;
  tb.disabled=true; tb.textContent="💡 Lade Tipp…";
  try{
    const tip=await callAPI([...s.apiH,{role:"user",content:`Konkreter Praxistipp für ${s.fach}: "${s.curQ.question}" — max. 3 Sätze. Dann Frage erneut.`}],400);
    const tc=document.createElement("div"); tc.className="tip-out fu";
    tc.innerHTML="💡 "+esc(tip.replace(/{"type"[^}]+}/s,"").trim().slice(0,350));
    const qc=document.querySelector(".q-card"); if(qc)qc.after(tc);
  }catch(e){}
  tb.disabled=false; tb.textContent="💡 Tipp zur Umsetzung";
}

let dRC=0;
function renderResults(){
  const s=S(); const d=s.result||{};
  const reiheBlock=s.reiheCtx?
    `<div class="res-card fu"><div class="res-card-body" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;"><span>↳ Teil der Reihe <strong>${esc(s.reiheCtx.name)}</strong> · Stunde ${s.reiheCtx.position}/${s.reiheCtx.total}</span><button class="btn-ghost" style="font-size:.75rem;padding:.3rem .7rem;" onclick="switchReihe('${s.reiheCtx.reiheId}')">Zur Reihe →</button></div></div>`
    :(reihen.length?
    `<div class="res-card fu"><div class="res-card-body" style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;"><span style="font-size:.82rem;color:var(--text2);">In eine Reihe einordnen:</span><select id="reihe-pick" class="dg-input" style="width:auto;padding:.3rem .6rem;font-size:.82rem;">${reihen.map(r=>`<option value="${r.id}">${esc(r.name)}</option>`).join("")}</select><button class="btn-ghost" style="font-size:.75rem;padding:.3rem .7rem;" onclick="assignSessionToReihe(document.getElementById('reihe-pick').value)">Zuordnen</button></div></div>`
    :"");
  document.getElementById("res-area").innerHTML=`
    <div class="res-hero fu">
      <div class="res-hero-label">🥗 Mittagessen-Test</div>
      <div class="res-hero-text" id="rk">${esc(d.kind||"")}</div>
      <button onclick="cp('rk')" style="margin-top:.45rem;font-size:.7rem;color:rgba(255,255,255,.7);border:none;background:none;cursor:pointer;font-family:var(--font);">Kopieren</button>
    </div>
    <div class="fu" style="display:flex;">
      <button class="btn-primary" onclick="downloadWordDoc()">📄 Als Word herunterladen</button>
    </div>
    <div class="res-card fu"><div class="res-card-head">🎤 Eröffnungssatz <button class="copy-btn" onclick="cp('re')">Kopieren</button></div><div class="res-card-body" id="re">${esc(d.eroeffnung||"").replace(/\n/g,"<br>")}</div></div>
    <div class="res-card fu"><div class="res-card-head">💬 Reflexionsfragen <button class="copy-btn" onclick="cp('rr')">Kopieren</button></div><div class="res-card-body" id="rr">${esc(d.reflexion||"").replace(/\n/g,"<br>")}</div></div>
    <div class="res-card fu"><div class="res-card-head">⚠️ Kohärenz-Hinweise</div><div class="res-card-body">${esc(d.hinweise||"").replace(/\n/g,"<br>")}</div></div>
    ${reiheBlock}
    <div class="dev-card fu">
      ${!s.noDg?`
      <h4>🎯 Nach der Stunde: Entwicklungsziel-Reflexion</h4>
      <p style="font-size:.8rem;color:var(--purple);margin-bottom:.3rem;">Entwicklungsziel: ${esc(s.dg||"Reflexionsphasen verbessern")}</p>
      <div class="dev-rating">${[1,2,3,4,5].map(n=>`<button onclick="setDR(${n})" id="dr${n}" class="${(s.devR||0)===n?"sel":""}">${n}</button>`).join("")}</div>
      <textarea class="dev-note" rows="2" id="drn" placeholder="Was hat geklappt? Was nicht?">${esc(s.devN||"")}</textarea>
      <div style="display:flex;gap:.5rem;margin-top:.55rem;flex-wrap:wrap;">
        <button class="btn-primary" style="font-size:.8rem;padding:.42rem 1rem;" onclick="saveDR()">Speichern</button>
        <button class="btn-ghost" style="font-size:.8rem;padding:.4rem .95rem;" onclick="getDRF()">KI-Feedback ✦</button>
        <button class="btn-ghost" style="font-size:.8rem;padding:.4rem .95rem;margin-left:auto;" onclick="newSession()">＋ Neue Planung</button>
      </div>
      <div id="dki" class="dev-ki-out hidden"></div>
      `:`
      <div style="display:flex;justify-content:flex-end;">
        <button class="btn-ghost" onclick="newSession()">＋ Neue Planung</button>
      </div>
      `}
    </div>`;
}

// Exports the planning result as a Word-compatible document. This is plain
// HTML served with a .doc extension/MIME type (a long-standing, widely
// supported trick for opening HTML directly in Word) rather than a real
// .docx — no zip/OOXML library is needed for it to work reliably.
function downloadWordDoc(){
  const s=S(); const d=s.result||{};
  const title=`${s.fach||""} · ${s.typ==="ub"?ubLabel(s.ubNr):"Normale Stunde"}${s.jgst?" · "+jgstShort(s.jgst):""}`;
  const nl2br=t=>esc(t||"").replace(/\n/g,"<br>");
  const html=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
<head><meta charset="utf-8"><title>${esc(title)}</title></head>
<body style="font-family:Calibri,Arial,sans-serif;font-size:11pt;">
<h1 style="font-size:18pt;">${esc(title)}</h1>
${s.selUV?`<p><b>Unterrichtsvorhaben:</b> ${esc(s.selUV.titel)}</p>`:""}
<p><b>Entwicklungsziel:</b> ${esc(s.dg||"Reflexionsphasen verbessern")}</p>
<h2 style="font-size:14pt;">🥗 Mittagessen-Test</h2><p>${nl2br(d.kind)}</p>
<h2 style="font-size:14pt;">🎤 Eröffnungssatz</h2><p>${nl2br(d.eroeffnung)}</p>
<h2 style="font-size:14pt;">💬 Reflexionsfragen</h2><p>${nl2br(d.reflexion)}</p>
<h2 style="font-size:14pt;">⚠️ Kohärenz-Hinweise</h2><p>${nl2br(d.hinweise)}</p>
${s.devN?`<h2 style="font-size:14pt;">Reflexion nach der Stunde</h2><p>${nl2br(s.devN)}</p>`:""}
</body></html>`;
  const blob=new Blob(["﻿",html],{type:"application/msword"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=(s.name||"Planung").replace(/[\\/:*?"<>|]/g,"_")+".doc";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function setDR(n){dRC=n;const s=S();if(s)s.devR=n;[1,2,3,4,5].forEach(i=>{const b=document.getElementById("dr"+i);if(b)b.classList.toggle("sel",i===n);});saveSessions();}
function saveDR(){const s=S();if(!s)return;s.devR=dRC;s.devN=(document.getElementById("drn")||{}).value||"";saveSessions();alert("Gespeichert ✓");}
async function getDRF(){
  const s=S();if(!s)return;
  const o=document.getElementById("dki");o.classList.remove("hidden");
  o.innerHTML='<span class="td"></span><span class="td"></span><span class="td"></span>';
  try{const t=await callAPI([{role:"user",content:`Ausbildungslehrkraft ${s.fach} NRW. Entwicklungsziel: ${s.dg||"Reflexionsphasen verbessern"}.\nSelbsteinschätzung: ${s.devR||"keine"}\nNotiz: ${s.devN||"keine"}\n2–3 konkrete Hinweise max. 80 Wörter. Text, kein JSON.`}],300);
  o.innerHTML=esc(t).replace(/\n/g,"<br>");}catch(e){o.innerHTML="⚠️ "+esc(e.message);}
}

// API
// ═══════════════════════════════════════════════════
async function callProxy(body){
  const resp=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e.error?.message||resp.statusText);}
  return resp.json();
}

async function callAPI(messages,maxTokens){
  const data=await callProxy({max_tokens:maxTokens||600,system:bldSys(),messages});
  return data.content.filter(b=>b.type==="text").map(b=>b.text).join("");
}

function setInp(on){const ci=document.getElementById("ci"),bs=document.getElementById("btn-send");if(ci)ci.disabled=!on;if(bs)bs.disabled=!on;if(on&&ci)setTimeout(()=>ci.focus(),50);}
function hk(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendAnswer();}}
function ar(ta){ta.style.height="auto";ta.style.height=Math.min(ta.scrollHeight,130)+"px";}
function esc(t){return(t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function jgstShort(j){return j?(["EF","Q1","Q2"].includes(j)?j:"Jg."+j):"";}
function ubLabel(ubNr){return ubNr==="upp"?"UPP":ubNr+". UB";}
function cp(id){navigator.clipboard.writeText(document.getElementById(id)?.innerText||"").then(()=>alert("Kopiert!"));}
